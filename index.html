<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أسماك البحار</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root{
    --navy:#001d3d;
    --yellow:#ffc300;
    --green:#25D366;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Cairo',sans-serif;
}

html,body{
    overflow-x:hidden;
}

body{
    background:var(--navy);
    color:#fff;
}

/* HERO */
.hero{
    padding:20px 6%;
    background:linear-gradient(135deg,var(--navy),#003566);
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    border-bottom:4px solid var(--yellow);
    position:relative;
}

.brand-center{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    font-size:1.5rem;
    font-weight:900;
    color:var(--yellow);
}

.hero-text h1{
    font-size:1.7rem;
}

.delivery-banner{
    background:rgba(255,255,255,.1);
    padding:10px;
    border-radius:12px;
}

.phone-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:6px;
}

.phone-grid a{
    background:rgba(0,0,0,.3);
    padding:6px;
    border-radius:8px;
    text-decoration:none;
    color:#fff;
    font-size:.8rem;
}

/* GRID */
.offers-section{
    padding:25px 6%;
    background:#f4f7f9;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:#fff;
    border-radius:18px;
    padding:15px;
    text-align:center;
    box-shadow:0 6px 20px rgba(0,0,0,.08);
}

.card img{
    width:100%;
    height:170px;
    object-fit:contain;
}

.card h3{
    color:#001d3d;
    margin:10px 0;
}

/* BUTTONS */
.view-btn,.order-btn{
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

.view-btn{background:#eee;}
.order-btn{background:var(--green);color:#fff;}

/* POPUP */
.popup{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.85);
    justify-content:center;
    align-items:center;
    z-index:2000;
}

/* تحسين الفورم */
.popup-content{
    background:#fff;
    padding:20px;
    border-radius:18px;
    width:90%;
    max-width:360px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* عنوان */
.popup-content::before{
    content:"🧾 بيانات الطلب";
    display:block;
    font-weight:900;
    color:#001d3d;
    margin-bottom:10px;
}

/* الحقول */
.popup-content input{
    width:100%;
    padding:12px 14px;
    margin:6px 0;
    border-radius:12px;
    border:2px solid #eee;
    font-size:0.95rem;
    background:#fafafa;
    transition:.3s;
}

.popup-content input:focus{
    border-color:#25D366;
    background:#fff;
}

/* صف */
.row{
    display:flex;
    gap:6px;
}

.row input{
    flex:1;
    text-align:center;
}

/* أزرار */
.popup-content button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    font-weight:900;
    cursor:pointer;
    background:#25D366;
    color:#fff;
}

.popup-content button:last-child{
    background:#eee;
    color:#333;
}

/* LIGHTBOX */
.lightbox{
    display:none;
    position:fixed;
    inset:0;
    background:#000;
    z-index:3000;
    justify-content:center;
    align-items:center;
}

.lightbox img{
    max-width:100%;
    max-height:100%;
}

/* MOBILE */
@media(max-width:768px){
.hero{flex-direction:column;text-align:center;}
.brand-center{position:static;transform:none;}
.phone-grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<section class="hero">
<div class="hero-text">
<h1>عروض الفسفور</h1>
</div>

<div class="brand-center">أسماك البحار</div>

<div class="delivery-banner">
<h3 style="color:var(--yellow)">لطلب الدليفري 🛵</h3>
<div class="phone-grid">
<a href="tel:01012948434">01012948434</a>
<a href="tel:01155549804">01155549804</a>
<a href="tel:01140882773">01140882773</a>
<a href="tel:01140882776">01140882776</a>
<a href="tel:01270429632">01270429632</a>
</div>
</div>
</section>

<main class="offers-section">
<div class="grid">

<div class="card">
<img src="1.png" onclick="openLightbox('1.png')">
<h3>صينية الحبايب</h3>
<button class="view-btn" onclick="openLightbox('1.png')">عرض الصورة</button>
<button class="order-btn" onclick="openPopup('صينية الحبايب')">اطلب الآن</button>
</div>

<div class="card">
<img src="2.png" onclick="openLightbox('2.png')">
<h3>وجبة البحار</h3>
<button class="view-btn" onclick="openLightbox('2.png')">عرض الصورة</button>
<button class="order-btn" onclick="openPopup('وجبة البحار')">اطلب الآن</button>
</div>

<div class="card">
<img src="3.png">
<h3>صينية العيلة</h3>
<button class="view-btn" onclick="openLightbox('3.png')">عرض الصورة</button>
<button class="order-btn" onclick="openPopup('صينية العيلة')">اطلب الآن</button>
</div>

<div class="card">
<img src="4.png">
<h3>وجبة أز أز</h3>
<button class="view-btn" onclick="openLightbox('4.png')">عرض الصورة</button>
<button class="order-btn" onclick="openPopup('وجبة أز أز')">اطلب الآن</button>
</div>

<div class="card">
<img src="5.png">
<h3>صينية الأكيلة</h3>
<button class="view-btn" onclick="openLightbox('5.png')">عرض الصورة</button>
<button class="order-btn" onclick="openPopup('صينية الأكيلة')">اطلب الآن</button>
</div>

<div class="card">
<img src="6.png">
<h3>وجبة جامبريكا</h3>
<button class="view-btn" onclick="openLightbox('6.png')">عرض الصورة</button>
<button class="order-btn" onclick="openPopup('وجبة جامبريكا')">اطلب الآن</button>
</div>

</div>
</main>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-content">

<input id="name" placeholder="الاسم بالكامل">
<input id="phone" placeholder="رقم الموبايل">
<input id="address" placeholder="العنوان بالتفصيل">

<div class="row">
<input id="building" placeholder="مبنى">
<input id="floor" placeholder="دور">
<input id="flat" placeholder="شقة">
</div>

<button onclick="sendOrder()">تأكيد الطلب</button>
<button onclick="closePopup()">إغلاق</button>

</div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" class="lightbox" onclick="closeLightbox()">
<img id="lightbox-img">
</div>

<script>
let product="";

function lockScroll(){
document.body.style.overflow="hidden";
document.documentElement.style.overflow="hidden";
}

function unlockScroll(){
document.body.style.overflow="";
document.documentElement.style.overflow="";
}

function openPopup(p){
product=p;
document.getElementById("popup").style.display="flex";
lockScroll();
}

function closePopup(){
document.getElementById("popup").style.display="none";
unlockScroll();
}

function openLightbox(img){
document.getElementById("lightbox-img").src=img;
document.getElementById("lightbox").style.display="flex";
lockScroll();
}

function closeLightbox(){
document.getElementById("lightbox").style.display="none";
unlockScroll();
}

function sendOrder(){
let msg=`طلب جديد 🍽️
${product}
${document.getElementById("name").value}
${document.getElementById("phone").value}
${document.getElementById("address").value}
مبنى ${document.getElementById("building").value}
دور ${document.getElementById("floor").value}
شقة ${document.getElementById("flat").value}`;

window.open("https://wa.me/201012948434?text="+encodeURIComponent(msg));
closePopup();
}
</script>

</body>
</html>
